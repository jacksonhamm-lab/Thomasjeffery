    body {
      background-color: #f0ede8;
      font-family: 'Lato', Arial, Helvetica, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      background-color: #faf8f4;
      max-width: 480px;
      width: 100%;
      padding: 56px 48px;
      text-align: center;
      border-top: 3px solid #1C2B39;

    .logo {
      max-width: 180px;
      height: auto;

    }

    .rule {
      width: 40px;
      height: 1px;
      background-color: #c8bfb5;
      margin: 0 auto 32px;
    }

    .headline {
      font-weight: 300;
      font-size: 38px;
      letter-spacing: 2px;
      color: #1C2B39;
      line-height: 1.3;
      margin-bottom: 32px;
    }

    .address {
      font-weight: 400;
      font-size: 12px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #8a8078;
      line-height: 1.8;
      margin-bottom: 40px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px 24px;
      font-family: 'Lato', Arial, Helvetica, sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.85; }

    .btn-google {
      background-color: #1C2B39;
      color: #ffffff;
    }

    .btn-apple {
      background-color: transparent;
      color: #1C2B39;
      border: 1px solid #1C2B39;
    }

    .btn svg {
      flex-shrink: 0;
    }

    .footer-note {
      margin-top: 36px;
      font-size: 11px;
      color: #a89e94;
      letter-spacing: 0.5px;
    }

    @media (max-width: 480px) {
      .card { padding: 40px 28px; }
      .headline { font-size: 30px; }
    }

    /* Cookie consent banner (matches site pattern) */
    .tj-consent{position:fixed;left:16px;right:16px;bottom:16px;z-index:1000;background:#1C2B39;color:#F5F0EB;border-radius:8px;box-shadow:0 12px 32px rgba(0,0,0,0.18);transform:translateY(120%);opacity:0;transition:transform 320ms cubic-bezier(0.4,0,0.2,1),opacity 320ms;pointer-events:none;max-width:720px;margin-inline:auto}
    .tj-consent--show{transform:translateY(0);opacity:1;pointer-events:auto}
    .tj-consent__inner{padding:20px 22px;display:flex;flex-direction:column;gap:14px}
    .tj-consent__text{margin:0;font-size:13px;line-height:1.6;color:#F5F0EB;font-family:'Lato',sans-serif;font-weight:300}
    .tj-consent__link{color:#F5F0EB;text-decoration:underline}
    .tj-consent__actions{display:flex;gap:10px;justify-content:flex-end}
    .tj-consent__btn{font-family:'Lato',sans-serif;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;font-weight:700;padding:10px 18px;border-radius:4px;border:1px solid #F5F0EB;cursor:pointer;background:transparent;color:#F5F0EB;transition:background 160ms,color 160ms}
    .tj-consent__btn--primary{background:#F5F0EB;color:#1C2B39}
    .tj-consent__btn--primary:hover{background:#E8E0D5}
    .tj-consent__btn--ghost:hover{background:rgba(245,240,235,0.10)}
    @media (min-width:700px){.tj-consent__inner{flex-direction:row;align-items:center}.tj-consent__text{flex:1}.tj-consent__actions{flex-shrink:0}}
    @media (prefers-reduced-motion: reduce){.tj-consent{transition:opacity 200ms}}

    function loadFB(){
      !function(f,b,e,v,n,t,s){
        if(f.fbq)return;n=f.fbq=function(){n.callMethod?
        n.callMethod.apply(n,arguments):n.queue.push(arguments)};

        n.queue=[];t=b.createElement(e);t.async=!0;

    }

    function applyConsent(state){
      if(state === 'granted'){
        gtag('consent', 'update', {
          'ad_storage': 'granted',
          'ad_user_data': 'granted',
          'ad_personalization': 'granted',

    var stored = null;

    window.tjConsent = {
      set: function(state){
        try { localStorage.setItem(KEY, state); } catch(e){}

  })();

    </p>
    <div class="tj-consent__actions">
      <button type="button" class="tj-consent__btn tj-consent__btn--ghost" data-tj-consent="denied">Decline</button>
      <button type="button" class="tj-consent__btn tj-consent__btn--primary" data-tj-consent="granted">Accept</button>
    </div>
  </div>
</div>
<script>
  (function(){
    var banner = document.getElementById('tj-consent');
    if(!banner) return;
    function show(){ banner.classList.add('tj-consent--show'); }
    function hide(){ banner.classList.remove('tj-consent--show'); }
    banner.addEventListener('click', function(e){
      var btn = e.target.closest('[data-tj-consent]');
      if(!btn) return;
      if(window.tjConsent) window.tjConsent.set(btn.getAttribute('data-tj-consent'));
      hide();
    });
    if(!window.tjConsent || !window.tjConsent.get()) show();
    window.tjConsentOpen = show;
  })();
</script>
