<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thomas Jeffery Men's Wear — Calgary</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: 'Lato', Arial, sans-serif;
      background: #F5F0EB;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ══════════════════════════════
       FULL-SCREEN LAYOUT
    ══════════════════════════════ */
    .landing {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    /* ══════════════════════════════
       LOGO
    ══════════════════════════════ */
    .landing__logo {
      height: 100px;
      width: auto;
      display: block;
      margin-bottom: 16px;
    }
    @media (min-width: 600px) {
      .landing__logo { height: 120px; }
    }

    /* ══════════════════════════════
       TAGLINE
    ══════════════════════════════ */
    .landing__tagline {
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: rgba(28,43,57,0.68);
      margin-bottom: 56px;
    }

    /* ══════════════════════════════
       PROMPT
    ══════════════════════════════ */
    .landing__prompt {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.48em;
      text-transform: uppercase;
      color: rgba(28,43,57,0.78);
      margin-bottom: 32px;
    }
    @media (min-width: 600px) {
      .landing__prompt { font-size: 14px; }
    }

    /* ══════════════════════════════
       TILES
    ══════════════════════════════ */
    .landing__tiles {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      width: 100%;
      max-width: 820px;
    }
    @media (min-width: 580px) {
      .landing__tiles { grid-template-columns: 1fr 1fr 1fr; }
    }

    .tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 14px;
      padding: 44px 28px;
      background: #1C2B39;
      border: 1px solid rgba(245,240,235,0.1);
      text-decoration: none;
      cursor: pointer;
      transition: background 0.22s, border-color 0.22s, transform 0.22s, box-shadow 0.22s;
    }
    .tile:hover {
      background: #243649;
      border-color: rgba(245,240,235,0.28);
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(28,43,57,0.18);
    }
    .tile__name {
      font-size: 20px;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #F5F0EB;
      line-height: 1.15;
      min-height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .tile__sub {
      font-size: 12px;
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.06em;
      color: rgba(245,240,235,0.88);
      display: block;
      line-height: 1.55;
      text-align: center;
    }

    /* ══════════════════════════════
       BROWSE ALL
    ══════════════════════════════ */
    .landing__skip {
      margin-top: 28px;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Lato', sans-serif;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.36em;
      text-transform: uppercase;
      color: rgba(28,43,57,0.55);
      transition: color 0.2s;
      padding: 8px;
      text-decoration: none;
      display: inline-block;
    }
    .landing__skip:hover { color: rgba(28,43,57,0.82); }

    /* ══════════════════════════════
       FOOTER LINE
    ══════════════════════════════ */
    .landing__footer {
      position: fixed;
      bottom: 22px;
      left: 0; right: 0;
      text-align: center;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(28,43,57,0.62);
    }
  </style>
</head>
<body>

<main class="landing">
  <img class="landing__logo"
       src="https://mcusercontent.com/a677e9b99521296ba09580ea8/images/8c767aaa-8e17-aad6-db85-b0383c08bd33.png"
       alt="Thomas Jeffery Men's Wear">

  <p class="landing__tagline">Calgary's Menswear Since 1968</p>

  <p class="landing__prompt">What brings you in?</p>

  <div class="landing__tiles">
    <a class="tile" href="office.html" data-mode="office">
      <span class="tile__name">Office</span>
      <span class="tile__sub">Sharp every day. Built to last.</span>
    </a>
    <a class="tile" href="wedding.html" data-mode="wedding">
      <span class="tile__name">Wedding</span>
      <span class="tile__sub">From the groom to the last groomsman.</span>
    </a>
    <a class="tile" href="casual.html" data-mode="casual">
      <span class="tile__name">Casual</span>
      <span class="tile__sub">Well-made pieces worth keeping.</span>
    </a>
  </div>

  <a class="landing__skip" href="office.html">Browse all →</a>
</main>

<p class="landing__footer">Kingsland Village · 7337 Macleod Trail SW · Calgary, AB · (403) 278-2445</p>

<script>
  /* ─── Save preference on tile click ─── */
  /* Returning visitor redirect will be added once all three pages exist */
  document.querySelectorAll('.tile').forEach(function(tile) {
    tile.addEventListener('click', function() {
      var mode = this.getAttribute('data-mode');
      if (mode) localStorage.setItem('tj_mode', mode);
      /* href handles navigation */
    });
  });

  /* ─── Clear any stale localStorage from earlier builds ─── */
  localStorage.removeItem('tj_mode');
</script>

</body>
</html>
